<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- TailwindCSS & Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- default CSS  -->
    <link rel="stylesheet" href="./styles/style.css" />
    <title>English Janala | Best English Learning Platform</title>
  </head>
  <body>
    <!-- header Section Start -->
    <header class="bg-sky-100 shadow-sm">
      <div class="navbar select-none w-11/12 mx-auto">
        <div class="navbar-start">
          <div class="dropdown space-x-2 md:space-x-0">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li>
                <a href="" class="uppercase"
                  ><i class="fa-solid fa-circle-question"></i> faq</a
                >
              </li>
              <li>
                <a href="" class="capitalize"
                  ><i class="fa-solid fa-book-open"></i> learn</a
                >
              </li>
              <li>
                <a href="" class="capitalize"
                  ><i class="fa-solid fa-arrow-right-from-bracket"></i>
                  logout</a
                >
              </li>
            </ul>
          </div>
          <a class="flex gap-1 items-center">
            <span class="text-lg font-bold">English</span>
            <span><img src="./assets/logo.png" alt="" /></span>
            <span class="font-bangla text-lg font-semibold">জানালা</span>
          </a>
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 space-x-4">
            <li>
              <a href="" class="btn btn-outline btn-primary uppercase"
                ><i class="fa-solid fa-circle-question"></i> faq</a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary capitalize"
                ><i class="fa-solid fa-book-open"></i> learn</a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary capitalize"
                ><i class="fa-solid fa-arrow-right-from-bracket"></i> logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </header>
    <!-- header Section End -->

    <main>
      <!-- hero section start -->
      <section
        class="w-11/12 mx-auto py-10 flex flex-col-reverse md:flex-row items-center justify-between gap-10"
      >
        <div class="content flex-1">
          <div class="hero-description text-center md:text-left">
            <h2 class="text-5xl text-neutral font-bold mb-6">
              <span class="text-info">English</span> is Easy!!
            </h2>
            <p class="text-lg font-medium">
              আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
              আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে
              যাবে অন্য একটি Level এ
            </p>
          </div>

          <div class="flex justify-center md:flex-none md:justify-start">
            <div class="card bg-base-100 max-w-sm md:w-full">
              <div class="card-body px-0">
                <fieldset class="fieldset space-y-4">
                  <input
                    type="text"
                    class="input"
                    placeholder="Enter Your Name"
                  />
                  <input type="password" class="input" placeholder="********" />
                  <button class="btn btn-primary w-full md:w-30">
                    Get Started
                  </button>
                </fieldset>
              </div>
            </div>
          </div>
        </div>

        <div class="img flex-1">
          <img src="./assets/hero-student.png" alt="" />
        </div>
      </section>
      <!-- hero section end -->

      <!-- lesson section start -->
      <section class="w-11/12 mx-auto">
        <h2 class="text-4xl font-bold text-center mb-10">
          <span class="text-sky-400">Let's</span> Learn Vocabularies
        </h2>

        <div
          class="lesson-btn flex justify-center items-center gap-5 flex-wrap mb-10"
        >
          <button class="btn btn-primary btn-outline">
            <i class="fa-solid fa-book-open"></i> Lesson-1
          </button>
          <button class="btn btn-primary btn-outline">
            <i class="fa-solid fa-book-open"></i> Lesson-2
          </button>
          <button class="btn btn-primary btn-outline">
            <i class="fa-solid fa-book-open"></i> Lesson-3
          </button>
          <button class="btn btn-primary btn-outline">
            <i class="fa-solid fa-book-open"></i> Lesson-4
          </button>
          <button class="btn btn-primary btn-outline">
            <i class="fa-solid fa-book-open"></i> Lesson-5
          </button>
          <button class="btn btn-primary btn-outline">
            <i class="fa-solid fa-book-open"></i> Lesson-6
          </button>
          <button class="btn btn-primary btn-outline">
            <i class="fa-solid fa-book-open"></i> Lesson-7
          </button>
        </div>
      </section>
      <!-- lesson section end -->
    </main>

    <script src="./script.js"></script>
  </body>
</html>
